<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARSTING | あなたの愛車を、クリエイティブの主役に。</title>
  <meta name="description" content="CARSTING - MV・PV撮影用の車両マッチングサービス。カーオーナーと映像制作会社をつなぎます。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0a0f;
      --bg-card: rgba(255, 255, 255, 0.04);
      --accent-cyan: #00e5ff;
      --accent-amber: #ffab00;
      --text-primary: #f0f0f5;
      --text-muted: rgba(255, 255, 255, 0.5);
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 20px;
    }

    /* Background animation */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-glow::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 50%, rgba(0, 229, 255, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 50%, rgba(255, 171, 0, 0.05) 0%, transparent 60%);
      animation: bgShift 12s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }

      100% {
        transform: translate(2%, -2%) rotate(3deg);
      }
    }

    /* Gateway container */
    .gateway {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
      max-width: 720px;
      width: 100%;
      animation: fadeInUp 0.8s ease-out both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .gateway-logo {
      width: 180px;
      margin: 0 auto 16px;
    }

    .gateway-logo img {
      width: 100%;
      height: auto;
    }

    .gateway-tagline {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .gateway-heading {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .gateway-sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    /* Cards */
    .gateway-cards {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .gateway-card {
      flex: 1;
      max-width: 300px;
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 28px 20px 28px;
      text-decoration: none;
      color: var(--text-primary);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .gateway-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .gateway-card--owner::before {
      background: radial-gradient(ellipse at center, rgba(0, 229, 255, 0.08) 0%, transparent 70%);
    }

    .gateway-card--company::before {
      background: radial-gradient(ellipse at center, rgba(255, 171, 0, 0.08) 0%, transparent 70%);
    }

    .gateway-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .gateway-card--owner:hover {
      border-color: rgba(0, 229, 255, 0.3);
    }

    .gateway-card--company:hover {
      border-color: rgba(255, 171, 0, 0.3);
    }

    .gateway-card:hover::before {
      opacity: 1;
    }

    .card-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.15));
    }

    .card-title {
      font-family: 'Oswald', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 16px;
      flex-grow: 1;
    }

    .card-arrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      transition: gap 0.3s ease;
    }

    .gateway-card--owner .card-arrow {
      color: var(--accent-cyan);
    }

    .gateway-card--company .card-arrow {
      color: var(--accent-amber);
    }

    .gateway-card:hover .card-arrow {
      gap: 12px;
    }

    .card-arrow svg {
      width: 16px;
      height: 16px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .gateway-logo {
        width: 120px;
        margin-bottom: 8px;
      }

      .gateway-tagline {
        font-size: 0.65rem;
        margin-bottom: 16px;
      }

      .gateway-heading {
        font-size: 1.15rem;
        margin-bottom: 6px;
      }

      .gateway-sub {
        font-size: 0.8rem;
        margin-bottom: 20px;
      }

      .gateway-cards {
        flex-direction: row;
        gap: 12px;
      }

      .gateway-card {
        padding: 20px 14px 20px;
      }

      .card-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 12px;
      }

      .card-title {
        font-size: 1rem;
        margin-bottom: 6px;
      }

      .card-desc {
        font-size: 0.72rem;
        line-height: 1.6;
        margin-bottom: 12px;
      }

      .card-arrow {
        font-size: 0.7rem;
      }

      .card-arrow svg {
        width: 14px;
        height: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-glow"></div>

  <div class="gateway">
    <div class="gateway-logo">
      <img src="assets/images/logo.png" alt="CARSTING">
    </div>
    <p class="gateway-tagline">Car × Casting for Creatives</p>

    <h1 class="gateway-heading">あなたはどちらですか？</h1>
    <p class="gateway-sub">ご利用目的に合わせてご案内いたします。</p>

    <div class="gateway-cards">
      <!-- Owner Card -->
      <a href="owner.html" class="gateway-card gateway-card--owner" id="gateway-owner">
        <div class="card-icon">
          <img src="assets/images/gateway_owner.png" alt="オーナー向けアイコン">
        </div>
        <h2 class="card-title">車をお持ちの方</h2>
        <p class="card-desc">愛車をMV・CMなどの映像作品に提供し、<br>手軽に撮影謝礼を受け取ることができます。</p>
        <span class="card-arrow">
          無料登録へ進む
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M5 12h14" />
            <path d="m12 5 7 7-7 7" />
          </svg>
        </span>
      </a>

      <!-- Company Card -->
      <a href="btob.html" class="gateway-card gateway-card--company" id="gateway-company">
        <div class="card-icon">
          <img src="assets/images/gateway_company.png" alt="制作会社向けアイコン">
        </div>
        <h2 class="card-title">車をお探しの方</h2>
        <p class="card-desc">独自の登録オーナーネットワークを利用し、<br>撮影に合わせた理想の一台を手配できます。</p>
        <span class="card-arrow">
          車両手配の相談へ進む
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M5 12h14" />
            <path d="m12 5 7 7-7 7" />
          </svg>
        </span>
      </a>
    </div>
  </div>
</body>

</html>
